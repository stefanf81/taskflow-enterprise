apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-backend
  namespace: taskflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskflow-backend
  template:
    metadata:
      labels:
        app: taskflow-backend
    spec:
      initContainers:
        - name: wait-for-db
          image: alpine:3.19.1
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          command: ["sh", "-c", "until nc -z -w 2 db 5432 && nc -z -w 2 redis 6379; do echo 'Waiting for database and redis...'; sleep 2; done;"]
      containers:
        - name: backend
          image: ghcr.io/stefanf81/taskflow-backend:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SPRING_PROFILES_ACTIVE
            - name: APP_CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: APP_CORS_ALLOWED_ORIGINS
            - name: SPRING_SECURITY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SPRING_SECURITY_PASSWORD
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: POSTGRES_PASSWORD
            - name: JAVA_TOOL_OPTIONS
              # Container-portable heap (cgroup-aware, ~60% of the 2560Mi limit ≈ 1.5GiB)
              # plus hard caps on off-heap memory so the container RSS cannot blow past
              # the limit. Previous flags pinned GC threads / AVX level (SIGILL + oversubscription
              # risk) and froze the young/old split with -UseAdaptiveSizePolicy but no explicit
              # generation sizes (an anti-pattern). AlwaysPreTouch was also removed so the heap
              # is committed lazily, shrinking idle RSS instead of pre-committing 1.5GiB at boot.
              # The collector is left unspecified so the JVM uses G1GC (JDK 21 default) — see the
              # Dockerfile for the rationale: inside a contended container CPU-share, G1's adaptive
              # pause-time control serves a server-style workload better than ParallelGC's raw
              # throughput bias measured on a 14-core laptop.
              value: "-Dspring.aot.enabled=true -XX:MaxRAMPercentage=60.0 -XX:MaxDirectMemorySize=256m -XX:MaxMetaspaceSize=256m -XX:+ExitOnOutOfMemoryError"
          ports:
            - containerPort: 8080
              name: http
          resources:
            limits:
              cpu: "4000m"
              memory: 2560Mi
            requests:
              cpu: "1000m"
              memory: 2048Mi
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 10
            failureThreshold: 2
      volumes:
        - name: tmp-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: taskflow
spec:
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: taskflow-backend
  type: NodePort
