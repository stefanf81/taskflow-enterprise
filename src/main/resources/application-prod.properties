# Server Configuration & High-Performance Gzip Compression
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
server.shutdown=graceful

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://db:5432/taskflow?reWriteBatchedInserts=true
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres-password}

# High-Performance HikariCP Connection Pool Tuning for Postgres
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# Disable H2 Console entirely in production
spring.h2.console.enabled=false

# Hibernate Configurations
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Hibernate Batch Fetching Optimization
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Hibernate WRITE batching (default_batch_fetch_size only affects reads).
# Combined with reWriteBatchedInserts=true on the JDBC URL, this makes
# save()/delete() emit multi-row batches instead of one statement per row.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration for Production
spring.flyway.enabled=true

# CORS Configuration for Production
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200

# Rate Limiting (enabled in prod)
app.rate-limit.enabled=true

# Spring Boot Actuator & Prometheus Observability
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

# Enable Kubernetes Liveness and Readiness Probes in Spring Boot
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Tag every series with the app + env
management.metrics.tags.application=taskflow-backend

# High-Performance Virtual Threads (Project Loom)
spring.threads.virtual.enabled=true

# Redis Configuration for Production
spring.cache.type=redis
spring.data.redis.host=redis
spring.data.redis.port=6379

# OpenTelemetry Tracing for Production
management.tracing.sampling.probability=0.1
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
