# Server Configuration
server.port=8080
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/plain

# Harden error responses in production (never leak stack traces or internal messages)
server.error.include-stacktrace=never
server.error.include-message=never
server.shutdown=graceful
server.tomcat.threads.min-spare=20
server.tomcat.threads.max=200
server.tomcat.accept-count=256

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://db:5432/taskflow?reWriteBatchedInserts=true&prepareThreshold=5&preparedStatementCacheQueries=256&preparedStatementCacheSizeMiB=64
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres-password}
spring.datasource.connection-fetch=lazy

# High-Performance HikariCP Connection Pool Tuning for Postgres
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=2000

# Disable H2 Console entirely in production
spring.h2.console.enabled=false

# Hibernate Configurations
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Hibernate Batch Fetching Optimization
spring.jpa.properties.hibernate.default_batch_fetch_size=32
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.query.plan_cache_max_size=4096
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=2048

# Hibernate WRITE batching (default_batch_fetch_size only affects reads).
# Combined with reWriteBatchedInserts=true on the JDBC URL, this makes
# save()/delete() emit multi-row batches instead of one statement per row.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Hibernate JDBC fetch size (streams large result sets from Postgres in batches of 50)
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Global JPA query timeout safeguard (ms) — prevents runaway queries from pinning pool connections
spring.jpa.properties.jakarta.persistence.query.timeout=5000

# Reduce Lob contextual-creation proxy overhead
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway Configuration for Production
spring.flyway.enabled=true

# CORS Configuration for Production
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200

# Rate Limiting (enabled in prod)
app.rate-limit.enabled=true

# Spring Boot Actuator & Prometheus Observability
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

# Jackson JSON Payload Minimization
spring.jackson.default-property-inclusion=non_null

# Enable Kubernetes Liveness and Readiness Probes in Spring Boot
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Tag every series with the app + env
management.metrics.tags.application=taskflow-backend

# Virtual Threads (Project Loom) intentionally DISABLED — CPU-bound /login (Bcrypt/RSA) suffers ~8% penalty under Loom.
spring.threads.virtual.enabled=false

# Redis Configuration for Production
spring.cache.type=redis
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000

# OpenTelemetry Tracing for Production
management.tracing.sampling.probability=0.1
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
