# Server Configuration & High-Performance Gzip Compression
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://db:5432/taskflow?reWriteBatchedInserts=true
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres-password}

# High-Performance HikariCP Connection Pool Tuning for Postgres
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# Disable H2 Console entirely in production
spring.h2.console.enabled=false

# Hibernate Configurations
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Hibernate Batch Fetching Optimization
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Flyway Configuration for Production
spring.flyway.enabled=true

# CORS Configuration for Production
app.cors.allowed-origins=http://localhost:4200

# Spring Boot Actuator & Prometheus Observability
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Enable Kubernetes Liveness and Readiness Probes in Spring Boot
management.endpoint.health.probes.enabled=true

# High-Performance Virtual Threads (Project Loom)
spring.threads.virtual.enabled=false

# Redis Configuration for Production
spring.cache.type=redis
spring.data.redis.host=redis
spring.data.redis.port=6379

# OpenTelemetry Tracing for Production
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
