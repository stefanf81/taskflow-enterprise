spring.application.name=taskflow

# Server Configuration & High-Performance Gzip Compression
server.port=8080
server.http2.enabled=true
server.tomcat.keep-alive-timeout=60000
server.tomcat.max-keep-alive-requests=100
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
server.shutdown=graceful
server.tomcat.threads.min-spare=20
server.tomcat.threads.max=200
server.tomcat.accept-count=100

# H2 Database Configuration (dev only - use PostgreSQL in prod)
spring.datasource.url=jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.leak-detection-threshold=2000

# Enable H2 Console only on localhost for security
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Spring Data JPA Configurations
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Hibernate Batch Fetching Optimization
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.query.plan_cache_max_size=4096
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=2048

# Hibernate WRITE batching (default_batch_fetch_size only affects reads).
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration
spring.flyway.enabled=true

# Spring Security default credentials (SPRING_SECURITY_PASSWORD must be set in production)
spring.security.user.name=admin
spring.security.user.password=${SPRING_SECURITY_PASSWORD:admin-password}

# CORS Configuration
app.cors.allowed-origins=*

# Rate Limiting (disabled in dev/test, enabled in prod)
app.rate-limit.enabled=false

# RSA Key Persistence (optional - set to persist JWT keys across restarts)
# Generate with: keytool -genkeypair -alias taskflow -keyalg RSA -keysize 2048 -storetype PKCS12 -keystore temp.p12 -validity 3650
# Export private: openssl pkcs12 -in temp.p12 -nodes -nocerts | openssl rsa -outform base64
# Export public: openssl pkcs12 -in temp.p12 -clcerts -nokeys | openssl x509 -outform base64
app.rsa.private-key=${APP_RSA_PRIVATE_KEY:}
app.rsa.public-key=${APP_RSA_PUBLIC_KEY:}

# Production Logging Configurations (Removed slow TRACE/DEBUG logs)
logging.config=classpath:logback-async.xml
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Spring Boot Actuator & Prometheus Observability
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

# Enable Kubernetes Liveness and Readiness Probes in Spring Boot
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Tag every series with the app + env
management.metrics.tags.application=taskflow-backend

# Cache Configuration
spring.cache.type=none
spring.data.redis.host=localhost
spring.data.redis.port=6379

# OpenTelemetry Tracing
management.tracing.sampling.probability=0.1
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# Virtual Threads (Project Loom) intentionally DISABLED — CPU-bound /login (Bcrypt/RSA) suffers ~8% penalty under Loom.
spring.threads.virtual.enabled=false

