# Upstream persistent connection pool to the Spring Boot backend
# This is an elite performance optimization that keeps TCP connections open permanently,
# eliminating the latency overhead of TCP handshakes on every single API request.
upstream backend_upstream {
    server backend:8080;
    keepalive 64; # Keep up to 64 idle connections open to the backend container
}

server {
    listen 8080;
    server_name localhost;

    # Core TCP/Socket Performance Tuning
    sendfile on;            # Transfer files directly from kernel space to socket (zero-copy)
    tcp_nopush on;          # Send headers and files in one packet
    tcp_nodelay on;         # Disable Nagle's algorithm to deliver small JSON payloads instantly

    # Keepalive Connection Limits for high-traffic browsers
    keepalive_timeout 65;
    keepalive_requests 10000; # Keep connections open for up to 10,000 sequential requests

    # HTTP Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com; connect-src 'self' https: wss: http://localhost:8080 http://127.0.0.1:8080 http://localhost:4200;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Enable Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Root directory for static assets
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Redirect all path requests to index.html for Angular Client-Side Routing
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    location /api/ {
        proxy_pass http://backend_upstream/api/;
        
        # Enable persistent keepalive connections to the backend
        proxy_http_version 1.1;
        proxy_set_header Connection ""; # Clear Connection header to allow keepalive
        proxy_set_header Accept-Encoding ""; # Prevent double-compression: Nginx compresses once for clients, backend sends raw
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Buffer Tuning for proxying high-throughput JSON payloads
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;
    }

    # Cache configurations for static files (improves speed)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf)$ {
        expires 6M;
        access_log off;
        
        # Duplicate HTTP Security Headers inside location block to prevent Nginx add_header inheritance wipe
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com; connect-src 'self' https: wss: http://localhost:8080 http://127.0.0.1:8080 http://localhost:4200;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        add_header Cache-Control "public";
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
