services:
  jenkins-docker:
    image: docker:dind
    container_name: jenkins-docker
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - jenkins-docker-certs:/certs/client
      - jenkins-data:/var/jenkins_home
      # [PERFORMANCE OPTIMIZATION] Persist the inner Docker daemon data (all pulled images, intermediate layers, and build caches)
      # between compose restarts. Bypasses rebuilding/re-pulling everything on every pipeline run!
      - jenkins-docker-data:/var/lib/docker
# [SECURITY HARDENING] Removed port 2376 mapping to host. 
# my-jenkins container talks to jenkins-docker directly inside the internal bridge network,
# so exposing root-privileged Docker socket on the host machine is completely unnecessary.
    networks:
      jenkins:
        aliases:
          - docker
    command: --storage-driver overlay2
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 3s
      retries: 10
    # [PERFORMANCE & STABILITY] Optimized specifically to unleash the hardware potential of a MacBook Pro M4 (10 to 16 cores)
    deploy:
      resources:
        limits:
          cpus: '10.0'
          memory: 8192M
        reservations:
          cpus: '4.0'
          memory: 4096M
    # [LOG ROTATION] Prevent Docker logs from bloating the host machine's disk
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  my-jenkins:
    image: my-jenkins
    build:
      context: .
    container_name: my-jenkins
    restart: on-failure
    environment:
      - DOCKER_HOST=tcp://docker:2376
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
    volumes:
      - jenkins-data:/var/jenkins_home
      - jenkins-docker-certs:/certs/client:ro
    ports:
      - '8081:8080'
      - '50000:50000'
    networks:
      - jenkins
    depends_on:
      jenkins-docker:
        condition: service_healthy    
    # [PERFORMANCE & STABILITY] JVM-optimized scaling for MacBook Pro M4 hardware
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4096M
        reservations:
          cpus: '2.0'
          memory: 2048M
    # [LOG ROTATION] Prevent Jenkins logs from bloating disk usage
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  jenkins:
    driver: bridge

volumes:
  jenkins-docker-certs:
  jenkins-data:
  jenkins-docker-data:
