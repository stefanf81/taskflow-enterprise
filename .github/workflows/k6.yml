name: k6 Browser Test

on:
  workflow_dispatch:

jobs:
  browser-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      BASE_URL: ${{ vars.BASE_URL }}

    steps:
      - uses: actions/checkout@v7

      - name: Verify BASE_URL is set
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::error::vars.BASE_URL is not set on this environment"
            exit 1
          fi

      - name: Run k6 browser test
        run: |
          docker run --rm \
            -e BASE_URL="$BASE_URL" \
            -v ${{ github.workspace }}:/work \
            -w /work \
            grafana/k6:latest-with-browser \
            run k6/browser.js
