name: Angular Browser Test

on:
  workflow_dispatch:

jobs:
  browser-test:
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ vars.BASE_URL }}

    steps:
      - uses: actions/checkout@v7

      - name: Run k6 browser test
        run: |
          docker run --rm \
            -e BASE_URL="$BASE_URL" \
            -v ${{ github.workspace }}:/work \
            -w /work \
            grafana/k6:master-with-browser \
            k6 run k6/browser.js
