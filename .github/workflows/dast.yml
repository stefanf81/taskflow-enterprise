name: DAST (OWASP ZAP Full Scan)

on:
  workflow_dispatch:

  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: read
  security-events: write

concurrency:
  group: dast-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: "21"

defaults:
  run:
    shell: bash

jobs:

  ###########################################################
  # DAST (OWASP ZAP)
  ###########################################################

  dast:
    name: OWASP ZAP Full Scan

    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:

      postgres:
        image: postgres:17

        env:
          POSTGRES_DB: taskflow
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U taskflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine

        ports:
          - 6379:6379

        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/taskflow
      SPRING_DATASOURCE_USERNAME: taskflow
      SPRING_DATASOURCE_PASSWORD: taskflow
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: 6379

    steps:

      ##########################################################
      # Checkout
      ##########################################################

      - name: Checkout
        uses: actions/checkout@v7

      ##########################################################
      # Java
      ##########################################################

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      ##########################################################
      # Build
      ##########################################################

      - name: Build Backend
        run: |
          ./gradlew \
            --parallel \
            --build-cache \
            bootJar

      ##########################################################
      # Start Backend
      ##########################################################

      - name: Start Spring Boot
        run: |
          nohup java \
            -Dspring.profiles.active=prod \
            -jar build/libs/*.jar \
            > spring.log 2>&1 < /dev/null &

      ##########################################################
      # Wait for Backend
      ##########################################################

      - name: Wait for Backend
        run: |
          echo "Waiting for Spring Boot..."

          timeout=180

          while (( timeout > 0 )); do

            if curl -fs http://localhost:8080/actuator/health/liveness; then
              echo "Backend ready"
              exit 0
            fi

            sleep 2
            timeout=$((timeout-2))

          done

          echo "Backend failed to start"
          cat spring.log
          exit 1

      ##########################################################
      # OWASP ZAP Full Scan
      ##########################################################

      - name: Run OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: http://localhost:8080

          fail_action: true

          allow_issue_writing: false

          artifact_name: zap-report

      - name: Generate Job Summary from ZAP Report
        if: always() && hashFiles('report_md.md') != ''
        run: |
          cat report_md.md >> $GITHUB_STEP_SUMMARY

      ##########################################################
      # Python
      ##########################################################

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.x"

      ##########################################################
      # Convert SARIF
      ##########################################################

      - name: Convert ZAP JSON to SARIF
        if: always() && hashFiles('report_json.json') != ''
        run: |
          python scripts/zap2sarif.py \
            report_json.json \
            zap-results.sarif

      ##########################################################
      # Upload SARIF
      ##########################################################

      - name: Upload SARIF
        if: always() && hashFiles('zap-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: zap-results.sarif
          category: dast-zap

      ##########################################################
      # Upload Reports
      ##########################################################

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-full-scan
          path: |
            spring.log
            report_html.html
            report_json.json
            report_md.md
            zap-results.sarif
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 30
