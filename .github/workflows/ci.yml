name: TaskFlow Enterprise CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      run_tests:
        description: Run all tests
        type: boolean
        default: true

      run_security:
        description: Run security scans
        type: boolean
        default: true

      run_dast:
        description: Run DAST scan (OWASP ZAP)
        type: boolean
        default: false

      push_images:
        description: Push Docker images
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  security-events: write
  actions: write
  pull-requests: read
  checks: write

concurrency:
  group: taskflow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "22"

  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-frontend

  TRIVY_VERSION: v0.72.0

defaults:
  run:
    shell: bash

jobs:
  ###########################################################
  # Detect changed components
  ###########################################################

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

      docker: ${{ steps.filter.outputs.docker }}
      docker_backend: ${{ steps.filter.outputs.docker_backend }}
      docker_frontend: ${{ steps.filter.outputs.docker_frontend }}

      docker_components: ${{ steps.components.outputs.matrix }}
      security_components: ${{ steps.security.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - src/**
              - build.gradle
              - settings.gradle
              - gradle/**

            frontend:
              - frontend/**

            docker:
              - Dockerfile*
              - frontend/Dockerfile
              - docker/**

            docker_backend:
              - Dockerfile*
              - docker/**

            docker_frontend:
              - frontend/Dockerfile
              - docker/**

      - name: Select Docker components
        id: components
        env:
          BACKEND_CHANGED: ${{ steps.filter.outputs.backend }}
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          DOCKER_BACKEND_CHANGED: ${{ steps.filter.outputs.docker_backend }}
          DOCKER_FRONTEND_CHANGED: ${{ steps.filter.outputs.docker_frontend }}
          IS_MAIN: ${{ github.ref == 'refs/heads/main' }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}

        run: |
          components=()

          if [[ "$BACKEND_CHANGED" == "true" || \
                "$DOCKER_BACKEND_CHANGED" == "true" || \
                "$IS_MAIN" == "true" || \
                "$IS_MANUAL" == "true" ]]; then
            components+=(backend)
          fi

          if [[ "$FRONTEND_CHANGED" == "true" || \
                "$DOCKER_FRONTEND_CHANGED" == "true" || \
                "$IS_MAIN" == "true" || \
                "$IS_MANUAL" == "true" ]]; then
            components+=(frontend)
          fi

          printf 'matrix=%s\n' \
            "$(printf '%s\n' "${components[@]}" | jq -R . | jq -s -c .)" \
            >> "$GITHUB_OUTPUT"

      - name: Select Security components
        id: security
        env:
          BACKEND_CHANGED: ${{ steps.filter.outputs.backend }}
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          DOCKER_CHANGED: ${{ steps.filter.outputs.docker }}
          IS_MAIN: ${{ github.ref == 'refs/heads/main' }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}

        run: |
          components=()

          if [[ "$BACKEND_CHANGED" == "true" || \
                "$DOCKER_CHANGED" == "true" || \
                "$IS_MAIN" == "true" || \
                "$IS_MANUAL" == "true" ]]; then
            components+=('{"name":"Backend","path":"."}')
          fi

          if [[ "$FRONTEND_CHANGED" == "true" || \
                "$DOCKER_CHANGED" == "true" || \
                "$IS_MAIN" == "true" || \
                "$IS_MANUAL" == "true" ]]; then
            components+=('{"name":"Frontend","path":"frontend"}')
          fi

          printf 'matrix=%s\n' \
            "$(printf '%s\n' "${components[@]}" | jq -s -c .)" \
            >> "$GITHUB_OUTPUT"

  ###########################################################
  # Dockerfile Lint
  ###########################################################

  lint:
    name: Dockerfile Lint
    needs: changes

    if: |
      needs.changes.outputs.docker == 'true' ||
      github.event_name == 'schedule'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.x64
          ignore: DL3018,DL3029

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: frontend/Dockerfile

  ###########################################################
  # Backend
  ###########################################################

  backend:
    name: Backend
    needs: changes

    if: |
      github.event_name == 'pull_request' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.docker_backend == 'true' ||
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Build
        run: |
          ./gradlew \
            --parallel \
            --build-cache \
            processAot \
            assemble \
            --stacktrace

      - name: Run Tests
        if: |
          github.event_name == 'pull_request' ||
          github.event_name == 'schedule' ||
          (
            github.event_name == 'workflow_dispatch' &&
            inputs.run_tests == true
          )
        run: |
          ./gradlew \
            --parallel \
            --build-cache \
            test \
            jacocoTestReport \
            --stacktrace

      - name: Upload Test Reports
        if: |
          always() && (
            github.event_name == 'pull_request' ||
            github.event_name == 'schedule' ||
            (
              github.event_name == 'workflow_dispatch' &&
              inputs.run_tests == true
            )
          )
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: |
            build/reports
            build/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Backend JAR
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: |
            build/libs/*.jar
            !build/libs/*-plain.jar
          compression-level: 0
          retention-days: 14

  ###########################################################
  # Dependency Submission
  ###########################################################

  dependency-submission:
    name: Dependency Submission

    needs: changes

    if: |
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule'
      )

    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Submit Dependency Graph
        uses: gradle/actions/dependency-submission@v6

  ###########################################################
  # Frontend
  ###########################################################

  frontend:
    name: Frontend

    needs: changes

    if: |
      github.event_name == 'pull_request' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.docker_frontend == 'true' ||
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'

    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          npm ci \
            --prefer-offline \
            --no-audit \
            --no-fund

      - name: Check Formatting
        run: npx prettier --check .

      - name: Cache Angular Build
        uses: actions/cache@v6
        with:
          path: frontend/.angular/cache
          key: angular-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            angular-${{ runner.os }}-

      - name: Run Unit Tests
        if: |
          github.event_name == 'pull_request' ||
          github.event_name == 'schedule' ||
          (
            github.event_name == 'workflow_dispatch' &&
            inputs.run_tests == true
          )

        run: |
          npx ng test \
            --watch=false \
            --coverage

      - name: Build Production Bundle
        run: npx ng build

      - name: Upload Frontend Bundle
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser
          compression-level: 0
          retention-days: 14

      - name: Upload Coverage
        if: |
          always() && (
            github.event_name == 'pull_request' ||
            github.event_name == 'schedule' ||
            (
              github.event_name == 'workflow_dispatch' &&
              inputs.run_tests == true
            )
          )

        uses: actions/upload-artifact@v7

        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore
          retention-days: 14

  ###########################################################
  # CodeQL
  ###########################################################

  codeql:
    name: CodeQL

    needs: changes

    if: |
      github.event_name == 'schedule' ||
      github.ref == 'refs/heads/main' ||
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.run_security == true
      )

    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false

      matrix:
        include:
          - language: java
            build-mode: autobuild

          - language: javascript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        if: matrix.language == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        if: matrix.language == 'java'
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  ###########################################################
  # Security
  ###########################################################

  security:
    name: Security Scan (${{ matrix.component.name }})

    needs: changes

    if: |
      (
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.docker == 'true' ||
        github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule'
      ) &&
      (
        github.event_name != 'workflow_dispatch' ||
        inputs.run_security == true
      )

    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      security-events: write
      packages: read

    strategy:
      fail-fast: false

      matrix:
        component: ${{ fromJSON(needs.changes.outputs.security_components) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      #####################################################
      # Dependency Review
      #####################################################

      - name: Dependency Review
        if: |
          github.event_name == 'pull_request' &&
          (
            matrix.component.name == 'Backend' ||
            (
              matrix.component.name == 'Frontend' &&
              needs.changes.outputs.backend != 'true'
            )
          )
        uses: actions/dependency-review-action@v5

      #####################################################
      # Cache Trivy Database
      #####################################################

      - name: Compute Trivy Cache Key
        id: trivy-cache-key
        run: |
          echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy Database
        uses: actions/cache@v6
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-${{ env.TRIVY_VERSION }}-${{ steps.trivy-cache-key.outputs.week }}
          restore-keys: |
            trivy-${{ runner.os }}-${{ env.TRIVY_VERSION }}-

      #####################################################
      # Filesystem Scan
      #####################################################

      # NOTE ON SEVERITY GATING (intentional asymmetry):
      # This filesystem/source scan is REPORT-ONLY (exit-code: 0) — it never
      # fails the build. It's meant to surface vulnerable dependencies early
      # (via the SARIF upload -> Code Scanning tab) without blocking PRs on
      # every transitive CVE in source manifests, many of which never ship.
      #
      # The Docker image scan in the `docker-build` job below is the hard
      # gate (exit-code: 1, severity: HIGH,CRITICAL) — it blocks the build
      # because that's the artifact that actually gets deployed.
      #
      # If you "fix" one of these to match the other, you will either start
      # blocking every PR on unshipped source CVEs, or stop blocking on
      # vulnerable images entirely. Keep them different on purpose.
      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: fs
          scan-ref: ${{ matrix.component.path }}
          format: sarif
          output: trivy-results.sarif

          # Non-blocking scan — see note above. Do not change without
          # also reconsidering the image scan's exit-code.
          exit-code: 0

      #####################################################
      # Upload Results
      #####################################################

      - name: Upload SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  ###########################################################
  # End-to-End Tests
  ###########################################################

  e2e:
    name: End-to-End Tests

    needs:
      - changes
      - backend
      - frontend

    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (
        github.ref == 'refs/heads/main' ||
        github.event_name == 'schedule' ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.run_tests == true
        )
      )

    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:17

        env:
          POSTGRES_DB: taskflow
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U taskflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine

        ports:
          - 6379:6379

        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/taskflow
      SPRING_DATASOURCE_USERNAME: taskflow
      SPRING_DATASOURCE_PASSWORD: taskflow
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: 6379

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      ##########################################################
      # Download Backend
      ##########################################################

      - name: Download Backend JAR
        uses: actions/download-artifact@v8
        with:
          name: backend-jar
          path: backend-jar-dir

      ##########################################################
      # Start Backend
      ##########################################################

      - name: Start Spring Boot
        run: |
          nohup java \
            -Dspring.profiles.active=prod \
            -jar backend-jar-dir/*.jar \
            > spring.log 2>&1 < /dev/null &

      ##########################################################
      # Wait for Backend
      ##########################################################

      - name: Wait for Backend
        run: |
          echo "Waiting for Spring Boot..."

          timeout=180

          while (( timeout > 0 )); do
            if curl -fs http://localhost:8080/actuator/health; then
              echo "Backend ready"
              exit 0
            fi

            sleep 2
            timeout=$((timeout-2))
          done

          echo "Backend failed to start"
          echo "=========================="
          cat spring.log
          echo "=========================="

          exit 1

      ##########################################################
      # Frontend
      ##########################################################

      - name: Install Frontend
        working-directory: frontend
        run: |
          npm ci \
            --prefer-offline \
            --no-audit \
            --no-fund

      ##########################################################
      # Playwright
      ##########################################################

      - name: Cache Playwright Browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        working-directory: frontend
        run: |
          npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        working-directory: frontend
        run: npm run e2e

      ##########################################################
      # Debug Logs
      ##########################################################

      - name: Print Spring Log on Failure
        if: failure()
        run: |
          echo "========== SPRING LOG =========="
          cat spring.log || true

      ##########################################################
      # Upload Reports
      ##########################################################

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            spring.log
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 14

  ###########################################################
  # DAST (OWASP ZAP)
  ###########################################################

  dast:
    name: DAST Scan (OWASP ZAP)

    needs:
      - changes
      - backend

    if: |
      github.event_name == 'schedule' ||
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.run_dast == true
      )

    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17

        env:
          POSTGRES_DB: taskflow
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U taskflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine

        ports:
          - 6379:6379

        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/taskflow
      SPRING_DATASOURCE_USERNAME: taskflow
      SPRING_DATASOURCE_PASSWORD: taskflow
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: 6379

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      ##########################################################
      # Download Backend
      ##########################################################

      - name: Download Backend JAR
        uses: actions/download-artifact@v8
        with:
          name: backend-jar
          path: backend-jar-dir

      ##########################################################
      # Start Backend
      ##########################################################

      - name: Start Spring Boot
        run: |
          nohup java \
            -Dspring.profiles.active=prod \
            -jar backend-jar-dir/*.jar \
            > spring.log 2>&1 < /dev/null &

      ##########################################################
      # Wait for Backend
      ##########################################################

      - name: Wait for Backend
        run: |
          echo "Waiting for Spring Boot..."

          timeout=180

          while (( timeout > 0 )); do
            if curl -fs http://localhost:8080/actuator/health; then
              echo "Backend ready"
              exit 0
            fi

            sleep 2
            timeout=$((timeout-2))
          done

          echo "Backend failed to start"
          cat spring.log
          exit 1

      ##########################################################
      # ZAP
      ##########################################################

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          format: openapi
          target: http://localhost:8080/v3/api-docs
          allow_issue_writing: false

      ##########################################################
      # Convert SARIF
      ##########################################################

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.x"

      - name: Convert ZAP JSON to SARIF
        if: always() && hashFiles('report_json.json') != ''
        run: |
          python scripts/zap2sarif.py \
            report_json.json \
            zap-results.sarif

      ##########################################################
      # Upload Results
      ##########################################################

      - name: Upload SARIF
        if: always() && hashFiles('zap-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: zap-results.sarif
          category: dast-zap

      - name: Upload DAST Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-dast-report
          path: |
            spring.log
            report_html.html
            report_json.json
            report_md.md
            zap-results.sarif
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 14

  ###########################################################
  # Docker
  ###########################################################

  docker-build:
    name: Build Docker (${{ matrix.component }})

    needs:
      - changes
      - backend
      - frontend

    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.docker == 'true' ||
        github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule'
      )

    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      # fail-fast is deliberately false: backend and frontend images are
      # built and scanned independently. A HIGH/CRITICAL CVE (and resulting
      # exit-code: 1) in one image's Trivy scan should not cancel the other
      # component's build — both scan results need to surface so both teams
      # get signal in the same run.
      fail-fast: false

      matrix:
        component: ${{ fromJSON(needs.changes.outputs.docker_components) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      ##########################################################
      # Download Artifacts
      ##########################################################

      - name: Download Backend JAR
        if: matrix.component == 'backend'
        uses: actions/download-artifact@v8
        with:
          name: backend-jar
          path: build/libs

      - name: Download Frontend Bundle
        if: matrix.component == 'frontend'
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser

      ##########################################################
      # Docker
      ##########################################################

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: |
          github.event_name == 'workflow_dispatch' &&
          inputs.push_images == true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      ##########################################################
      # Build
      ##########################################################

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.component == 'backend' && '.' || 'frontend' }}
          file: ${{ matrix.component == 'backend' && 'Dockerfile.x64' || 'frontend/Dockerfile' }}

          push: ${{ github.event_name == 'workflow_dispatch' && inputs.push_images == true }}
          load: ${{ !(github.event_name == 'workflow_dispatch' && inputs.push_images == true) }}

          tags: |
            ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}:latest

          cache-from: |
            type=gha,scope=${{ matrix.component }}-main
            type=gha,scope=${{ matrix.component }}-pr

          cache-to: |
            type=gha,mode=max,scope=${{ matrix.component }}-${{ github.ref == 'refs/heads/main' && 'main' || 'pr' }}

          provenance: ${{ github.event_name == 'workflow_dispatch' && inputs.push_images == true }}
          sbom: ${{ github.event_name == 'workflow_dispatch' && inputs.push_images == true }}

      ##########################################################
      # Scan
      ##########################################################

      # NOTE ON SEVERITY GATING (intentional asymmetry):
      # This is the HARD GATE — exit-code: 1 with severity HIGH,CRITICAL
      # fails the build/push. This scan targets the actual image that gets
      # deployed, unlike the source/filesystem Trivy scan in the `security`
      # job, which is report-only (exit-code: 0) by design. Do not align
      # the two exit-codes without deliberately reconsidering both.
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}

          image-ref: ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

          scan-type: image

          format: sarif
          output: trivy-results.sarif

          severity: HIGH,CRITICAL
          ignore-unfixed: true

          exit-code: 1

      ##########################################################
      # Upload SARIF
      ##########################################################

      - name: Upload SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: docker-${{ matrix.component }}
