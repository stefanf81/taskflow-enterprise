name: TaskFlow Enterprise CI/CD (Optimized Fast + Production)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_lint_and_format:
        type: boolean
        default: true
      run_tests:
        type: boolean
        default: false
      run_security_scans:
        type: boolean
        default: false

############################################################
# 🧷 SAFER CONCURRENCY
############################################################
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-frontend

############################################################
# 🔍 CHANGE DETECTION
############################################################
jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'src/**'
              - 'build.gradle'
              - 'Dockerfile.x64'
            frontend:
              - 'frontend/**'

  ############################################################
  # 🧹 LINT (FAST GATE)
  ############################################################
  lint:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.run_lint_and_format

    steps:
      - uses: actions/checkout@v4

      - name: Dockerfile lint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.x64
          ignore: DL3018,DL3029

      - name: Frontend format check
        run: |
          if [ -d frontend ]; then
            cd frontend
            npx prettier --check "src/**/*.ts" "src/**/*.html"
          fi

  ############################################################
  # ☕ BACKEND (OPTIMIZED GRADLE)
  ############################################################
  backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=true -Dorg.gradle.configuration-cache=true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v6

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build + Test (optimized)
        if: github.event_name != 'workflow_dispatch' || inputs.run_tests
        run: ./gradlew test assemble --parallel --build-cache

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image (optimized cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.x64
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Trivy scan backend
        if: github.event_name != 'workflow_dispatch' || inputs.run_security_scans
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-backend.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: backend-container

  ############################################################
  # 🎨 FRONTEND (OPTIMIZED CACHE)
  ############################################################
  frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-

      - name: Install dependencies (optimized)
        run: |
          cd frontend
          npm ci --prefer-offline --no-audit --no-fund

      - name: Unit tests
        if: github.event_name != 'workflow_dispatch' || inputs.run_tests
        run: cd frontend && npm run test -- --watch=false --coverage

      - name: Build frontend
        run: cd frontend && npm run build

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy scan frontend
        if: github.event_name != 'workflow_dispatch' || inputs.run_security_scans
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-frontend.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: frontend-container

  ############################################################
  # 🧪 E2E (FAST + RELIABLE)
  ############################################################
  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name != 'workflow_dispatch' || inputs.run_tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Start backend
        run: |
          nohup ./gradlew bootRun > spring.log 2>&1 &

          timeout 120 bash -c '
          until curl -fs http://localhost:8080/actuator/health || curl -fs http://localhost:8080/; do
            sleep 2
          done'

      - name: Install frontend deps
        run: cd frontend && npm ci --prefer-offline --no-audit --no-fund

      - name: Playwright E2E (optimized)
        run: |
          cd frontend
          npx playwright install
          npm run e2e

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: spring.log