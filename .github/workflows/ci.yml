name: TaskFlow Enterprise CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      run_tests:
        description: Run all tests
        type: boolean
        default: true

      run_security:
        description: Run security scans
        type: boolean
        default: true

      push_images:
        description: Push Docker images
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read
  pull-requests: read
  checks: write

concurrency:
  group: taskflow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "22"

  REGISTRY: ghcr.io

  IMAGE_TAG: ${{ github.sha }}

  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-backend

  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-frontend

defaults:
  run:
    shell: bash
jobs:

  changes:

    name: Detect Changes

    runs-on: ubuntu-latest

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}

    steps:

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v4

        with:

          filters: |

            backend:

              - src/**

              - build.gradle

              - settings.gradle

              - gradle/**

            frontend:

              - frontend/**

            docker:

              - Dockerfile*

              - docker/**
  lint:

    name: Lint & Formatting

    needs: changes

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:

      - uses: actions/checkout@v5

      - name: Dockerfile Lint

        uses: hadolint/hadolint-action@v3.1.0

        with:

          dockerfile: Dockerfile.x64

          ignore: DL3018,DL3029

      - name: Setup Node

        uses: actions/setup-node@v5

        with:

          node-version: ${{ env.NODE_VERSION }}

          cache: npm

          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend

        run: |

          cd frontend

          npm ci

      - name: Prettier

        run: |

          cd frontend

          npx prettier --check .

      - name: ESLint

        run: |

          cd frontend

          npm run lint