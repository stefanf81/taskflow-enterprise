name: TaskFlow Enterprise CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_tests:
        description: Run all tests
        type: boolean
        default: true
      run_security:
        description: Run security scans
        type: boolean
        default: true
      push_images:
        description: Push Docker images
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  security-events: write
  actions: write
  pull-requests: read
  checks: write

concurrency:
  group: taskflow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-frontend

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      docker_backend: ${{ steps.filter.outputs.docker_backend }}
      docker_frontend: ${{ steps.filter.outputs.docker_frontend }}
      docker_components: ${{ steps.components.outputs.matrix }}
      security_components: ${{ steps.security_components.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - src/**
              - build.gradle
              - settings.gradle
              - gradle/**
            frontend:
              - frontend/**
            docker:
              - Dockerfile*
              - frontend/Dockerfile
              - docker/**
            docker_backend:
              - Dockerfile*
              - docker/**
            docker_frontend:
              - frontend/Dockerfile
              - docker/**

      - name: Select Docker components
        id: components
        env:
          BACKEND_CHANGED: ${{ steps.filter.outputs.backend }}
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          DOCKER_BACKEND_CHANGED: ${{ steps.filter.outputs.docker_backend }}
          DOCKER_FRONTEND_CHANGED: ${{ steps.filter.outputs.docker_frontend }}
          IS_MAIN: ${{ github.ref == 'refs/heads/main' }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          components=()
          if [[ "$BACKEND_CHANGED" == "true" || "$DOCKER_BACKEND_CHANGED" == "true" || "$IS_MAIN" == "true" || "$IS_MANUAL" == "true" ]]; then
            components+=(backend)
          fi
          if [[ "$FRONTEND_CHANGED" == "true" || "$DOCKER_FRONTEND_CHANGED" == "true" || "$IS_MAIN" == "true" || "$IS_MANUAL" == "true" ]]; then
            components+=(frontend)
          fi
          if (( ${#components[@]} == 0 )); then
            components+=(none)
          fi
          printf 'matrix=%s\n' "$(printf '%s\n' "${components[@]}" | jq -R . | jq -s -c .)" >> "$GITHUB_OUTPUT"

      - name: Select Security components
        id: security_components
        env:
          BACKEND_CHANGED: ${{ steps.filter.outputs.backend }}
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          DOCKER_CHANGED: ${{ steps.filter.outputs.docker }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          components=()
          if [[ "$BACKEND_CHANGED" == "true" || "$DOCKER_CHANGED" == "true" || "$IS_MANUAL" == "true" ]]; then
            components+=('{"name":"Backend","path":"."}')
          fi
          if [[ "$FRONTEND_CHANGED" == "true" || "$DOCKER_CHANGED" == "true" || "$IS_MANUAL" == "true" ]]; then
            components+=('{"name":"Frontend","path":"frontend"}')
          fi
          if (( ${#components[@]} == 0 )); then
            components+=('{"name":"none","path":"none"}')
          fi
          printf 'matrix=%s\n' "$(printf '%s\n' "${components[@]}" | jq -s -c .)" >> "$GITHUB_OUTPUT"

  lint:
    name: Dockerfile Lint
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.x64
          ignore: DL3018,DL3029

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: frontend/Dockerfile

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.docker_backend == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew --parallel --build-cache processAot assemble --stacktrace

      - name: Run Tests
        if: github.event_name == 'workflow_dispatch' && inputs.run_tests == true
        run: ./gradlew --parallel --build-cache test jacocoTestReport --stacktrace

      - name: Upload Test Reports
        if: always() && (github.event_name == 'workflow_dispatch' && inputs.run_tests == true)
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: |
            build/reports
            build/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Backend JAR
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: |
            build/libs/*.jar
            !build/libs/*-plain.jar
          compression-level: 0
          retention-days: 14

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.docker_frontend == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci \
            --prefer-offline \
            --no-audit \
            --no-fund

      - name: Check formatting
        run: npx prettier --check .

      - name: Cache Angular build
        uses: actions/cache@v6
        with:
          path: frontend/.angular/cache
          key: angular-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            angular-${{ runner.os }}-

      - name: Run unit tests
        if: github.event_name == 'workflow_dispatch' && inputs.run_tests == true
        run: |
          npx ng test \
            --watch=false \
            --coverage

      - name: Build production bundle
        run: npx ng build

      - name: Upload Frontend Production Bundle
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser
          compression-level: 0
          retention-days: 14

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always() && (github.event_name == 'workflow_dispatch' && inputs.run_tests == true)
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore
          retention-days: 14

  codeql:
    name: CodeQL
    needs:
      - changes
      - backend
      - frontend
    if: |
      always() &&
      github.event_name != 'push' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.docker == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java
            build-mode: autobuild
          - language: javascript
            build-mode: none
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        if: matrix.language == 'java'
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v6
        if: matrix.language == 'java'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v4

      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@v4

  security:
    name: Security Scan (${{ matrix.component.name }})
    needs: changes
    if: |
      github.event_name != 'push' &&
      (github.event_name != 'workflow_dispatch' || inputs.run_security)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.changes.outputs.security_components) }}
    steps:
      - uses: actions/checkout@v7
        if: matrix.component.name != 'none'

      #####################################################
      # Dependency Review (Pull Requests)
      #####################################################
      - name: Dependency Review
        if: matrix.component.name == 'Backend' && github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v5

      #####################################################
      # Cache Trivy database
      #####################################################
      - name: Set Trivy cache key
        if: matrix.component.name != 'none'
        id: trivy-cache-key
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy database
        if: matrix.component.name != 'none'
        uses: actions/cache@v6
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-v0.36.0-${{ steps.trivy-cache-key.outputs.week }}
          restore-keys: |
            trivy-${{ runner.os }}-v0.36.0-

      #####################################################
      # Filesystem Scan
      #####################################################
      - name: Filesystem Scan
        if: matrix.component.name != 'none'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.component.path }}
          format: sarif
          output: trivy-results.sarif
          exit-code: 0

      - name: Upload SARIF
        if: matrix.component.name != 'none' && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  e2e:
    name: End-to-End Tests
    needs:
      - changes
      - backend
      - frontend
      - codeql
      - security
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      (github.event_name == 'workflow_dispatch' && inputs.run_tests == true)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: taskflow
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/taskflow
      SPRING_DATASOURCE_USERNAME: taskflow
      SPRING_DATASOURCE_PASSWORD: taskflow
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      ##########################################################
      # Download Backend JAR
      ##########################################################
      - name: Download Backend JAR
        uses: actions/download-artifact@v8
        with:
          name: backend-jar
          path: backend-jar-dir

      ##########################################################
      # Start Backend
      ##########################################################
      - name: Start Spring Boot
        run: |
          nohup java -Dspring.profiles.active=prod -jar backend-jar-dir/*.jar > spring.log 2>&1 < /dev/null &

      ##########################################################
      # Wait for Backend
      ##########################################################
      - name: Wait for Backend
        run: |
          echo "Waiting for Spring Boot..."
          for i in {1..90}; do
            if curl -fs http://localhost:8080/actuator/health; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed"
          echo "=============================="
          cat spring.log
          echo "=============================="
          exit 1

      ##########################################################
      # Frontend
      ##########################################################
      - name: Install Frontend
        working-directory: frontend
        run: |
          npm ci \
            --prefer-offline \
            --no-audit \
            --no-fund

      ##########################################################
      # Playwright
      ##########################################################
      - name: Cache Playwright Browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: frontend
        run: npm run e2e

      ##########################################################
      # Upload Reports
      ##########################################################
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            spring.log
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 14

  docker-build:
    name: Build Docker (${{ matrix.component }})
    needs: 
      - changes
      - backend
      - frontend
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.docker == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        component: ${{ fromJSON(needs.changes.outputs.docker_components) }}
    steps:
      - uses: actions/checkout@v7

      - name: Download Backend JAR
        if: matrix.component == 'backend'
        uses: actions/download-artifact@v8
        with:
          name: backend-jar
          path: build/libs

      - name: Download Frontend Production Bundle
        if: matrix.component == 'frontend'
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser

      - uses: docker/setup-buildx-action@v4
        if: matrix.component != 'none'

      - uses: docker/login-action@v4
        if: matrix.component != 'none' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push_images))
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        if: matrix.component != 'none'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.component == 'backend' && '.' || 'frontend' }}
          file: ${{ matrix.component == 'backend' && 'Dockerfile.x64' || 'frontend/Dockerfile' }}
          load: true
          tags: ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: |
            type=gha,scope=${{ matrix.component }}-main
            type=gha,scope=${{ matrix.component }}-pr
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-${{ github.ref == 'refs/heads/main' && 'main' || 'pr' }}
          provenance: false
          sbom: false

      - name: Scan Docker Image
        if: matrix.component != 'none'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          scan-type: image
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Upload SARIF
        if: matrix.component != 'none' && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Push Image
        if: matrix.component != 'none' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push_images))
        run: docker push ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Push Latest
        if: matrix.component != 'none' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push_images))
        run: docker buildx imagetools create ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} --tag ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}:latest
