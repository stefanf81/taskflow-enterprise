name: TaskFlow Enterprise CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_tests:
        description: Run all tests
        type: boolean
        default: true
      run_security:
        description: Run security scans
        type: boolean
        default: true
      push_images:
        description: Push Docker images
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read
  pull-requests: read
  checks: write

concurrency:
  group: taskflow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-frontend

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - src/**
              - build.gradle
              - settings.gradle
              - gradle/**
            frontend:
              - frontend/**
            docker:
              - Dockerfile*
              - docker/**

  lint:
    name: Dockerfile Lint
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Dockerfile Lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.x64
          ignore: DL3018,DL3029

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: |
          ./gradlew \
            test \
            processAot \
            assemble \
            jacocoTestReport \
            --stacktrace

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: |
            build/reports
            build/test-results

      - name: Upload Backend JAR
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: |
            build/libs/*.jar
            !build/libs/*-plain.jar

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci \
            --prefer-offline \
            --no-audit \
            --no-fund

      - name: Check formatting
        run: npx prettier --check .

      - name: Run unit tests
        run: |
          npm run test -- \
            --watch=false \
            --coverage

      - name: Build production bundle
        run: npm run build

      - name: Upload Frontend Production Bundle
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: |
            frontend/coverage

  security-backend:
    name: Security Scan (Backend)
    needs: changes
    if: |
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.docker == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || inputs.run_security)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@v7

      #####################################################
      # Dependency Review (Pull Requests)
      #####################################################
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      #####################################################
      # Cache Trivy database
      #####################################################
      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            trivy-${{ runner.os }}-

      #####################################################
      # Filesystem Scan
      #####################################################
      - name: Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0

  security-frontend:
    name: Security Scan (Frontend)
    needs: changes
    if: |
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.docker == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || inputs.run_security)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@v7

      #####################################################
      # Cache Trivy database
      #####################################################
      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            trivy-${{ runner.os }}-

      #####################################################
      # Filesystem Scan
      #####################################################
      - name: Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: frontend
          format: table
          exit-code: 0

  e2e:
    name: End-to-End Tests
    needs:
      - changes
      - backend
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || inputs.run_tests)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: taskflow
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/taskflow
      SPRING_DATASOURCE_USERNAME: taskflow
      SPRING_DATASOURCE_PASSWORD: taskflow
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      ##########################################################
      # Download Backend JAR
      ##########################################################
      - name: Download Backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-jar-dir

      ##########################################################
      # Start Backend
      ##########################################################
      - name: Start Spring Boot
        run: |
          nohup java -Dspring.profiles.active=prod -jar backend-jar-dir/*.jar > spring.log 2>&1 &

      ##########################################################
      # Wait for Backend
      ##########################################################
      - name: Wait for Backend
        run: |
          echo "Waiting for Spring Boot..."
          for i in {1..90}; do
            if curl -fs http://localhost:8080/actuator/health; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed"
          echo "=============================="
          cat spring.log
          echo "=============================="
          exit 1

      ##########################################################
      # Frontend
      ##########################################################
      - name: Install Frontend
        working-directory: frontend
        run: |
          npm ci \
            --prefer-offline \
            --no-audit \
            --no-fund

      ##########################################################
      # Playwright
      ##########################################################
      - name: Get Playwright version
        id: playwright-version
        working-directory: frontend
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run Playwright
        working-directory: frontend
        run: npm run e2e

      ##########################################################
      # Upload Reports
      ##########################################################
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
            spring.log

  docker-build:
    name: Build Docker (${{ matrix.component }})
    needs: 
      - changes
      - e2e
      - backend
      - frontend
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v7

      - name: Download Backend JAR
        if: matrix.component == 'backend'
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: build/libs

      - name: Download Frontend Production Bundle
        if: matrix.component == 'frontend'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push_images)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.component == 'backend' && '.' || 'frontend' }}
          file: ${{ matrix.component == 'backend' && 'Dockerfile.x64' || 'frontend/Dockerfile' }}
          push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push_images) }}
          tags: ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: |
            type=gha,scope=${{ matrix.component }}-main
            type=gha,scope=${{ matrix.component }}-pr
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-${{ github.ref == 'refs/heads/main' && 'main' || 'pr' }}
          provenance: false
          sbom: false

      - name: Push Latest
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push_images)
        run: docker buildx imagetools create ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} --tag ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}:latest
