services:
  db:
    image: postgres:18.4-alpine
    container_name: taskflow-db
    command:
      - "postgres"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "checkpoint_timeout=15min"
      - "-c"
      - "wal_compression=on"
      - "-c"
      - "max_wal_size=1GB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "autovacuum_work_mem=128MB"
      - "-c"
      - "jit=off"
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - backend-tier
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: taskflow-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      # JVM sizing is owned by the deployment (JAVA_TOOL_OPTIONS), not the image
      # CMD — see Dockerfile / Dockerfile.x64 for the sizing-agnostic rationale.
      # This block mirrors the prod homelab/TF backend.yaml intent (modulo
      # prod-only GC logging + heap-dump paths that would clutter a laptop).
      # At 2560M limit × MaxRAMPercentage=50.0 → ~1.25 GiB heap, ~1.3 GiB off-heap.
      - JAVA_TOOL_OPTIONS=-XX:+UseG1GC -XX:MaxRAMPercentage=50.0 -XX:MaxGCPauseMillis=100 -XX:+ExitOnOutOfMemoryError -XX:+UseStringDeduplication -XX:+AlwaysPreTouch -XX:+ParallelRefProcEnabled -XX:+DisableExplicitGC -XX:MaxDirectMemorySize=256m -XX:MaxMetaspaceSize=256m
    env_file:
      - .env
    networks:
      - frontend-tier
      - backend-tier
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2560M
        reservations:
          memory: 1536M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v3/api-docs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_healthy
        required: false
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:8-alpine
    container_name: taskflow-redis
    command:
      - "redis-server"
      - "--io-threads"          # Redis 8.0: multi-threaded network I/O
      - "2"                     # 1 CPU allocated → 2 threads (main + 1 I/O)
      - "--io-threads-do-reads" # Extend threading to read operations too
      - "yes"
      - "--lazyfree-lazy-expire" # Redis 8.0: async deletion of expired keys
      - "yes"                    # Prevents latency spikes from rate-limit key churn
      - "--maxmemory"           # Cap memory at 50% of container limit (512M)
      - "256mb"
      - "--maxmemory-policy"    # Only evict keys that have a TTL set
      - "volatile-lru"          # Safe: rate-limit + cache keys all have TTLs
      - "--stop-writes-on-bgsave-error" # Don't reject writes if persistence fails
      - "no"                     # Cache/rate-limiter can lose data safely
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - backend-tier
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  jaeger:
    image: jaegertracing/jaeger:2.20.0
    container_name: taskflow-jaeger
    profiles: ["observability"]
    ports:
      - "16686:16686"        # Jaeger UI (HTTP)
      - "4317:4317"          # OTLP gRPC
      - "4318:4318"          # OTLP HTTP
      - "13133:13133"        # Health check (healthcheckv2 extension)
    environment:
      - JAEGER_LISTEN_HOST=0.0.0.0
      - LOG_LEVEL=info
    volumes:
      - ./jaeger/jaeger-config.yaml:/etc/jaeger/jaeger-config.yaml:ro
    command: ["--config", "/etc/jaeger/jaeger-config.yaml"]
    networks:
      - backend-tier
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:13133/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: taskflow-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    ports:
      - "4200:8080" # Map host 4200 to Nginx-unprivileged port 8080
    networks:
      - frontend-tier
    read_only: true
    tmpfs:
      - /tmp:uid=101,gid=101
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  redisdata:

networks:
  frontend-tier:
    driver: bridge
  backend-tier:
    driver: bridge
