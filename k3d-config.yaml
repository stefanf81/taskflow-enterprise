apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: taskflow-cluster
servers: 1
agents: 0
ports:
  - port: 8080:30080
    nodeFilters:
      - server:0
  - port: 4200:30042
    nodeFilters:
      - server:0
options:
  k3d:
    wait: true
    timeout: "120s"
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:0
      - arg: --disable=servicelb
        nodeFilters:
          - server:0
