name: Test CodeQL
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: java
          build-mode: none
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
